server:
  port: 18082

spring:
  application:
    name: canal-web
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:canal_web}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      continue-on-error: true

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-cookie: false

canal-web:
  project-dir: ${CANAL_WEB_PROJECT_DIR:}
  runtime:
    root-dir: ./canal-runtime
    java-command: ${JAVA_CMD:java}
    auto-start: true
    restart-on-change: true
    canal-server:
      enabled: true
      home: ./canal-runtime/canal-server
      port: 11111
      metrics-port: 11112
      admin-port: 11110
    canal-adapter:
      enabled: true
      home: ./canal-runtime/canal-adapter
      port: 18083
      mode: tcp
      canal-host: 127.0.0.1
      canal-port: 11111
  scheduler:
    scan-interval-ms: 30000
